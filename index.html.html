<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PE Testing — Promise Engine Node Flow Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&display=swap');

  :root {
    --bg: #0c0e14;
    --surface: #141722;
    --surface2: #1a1f2e;
    --border: #252b3b;
    --text: #e2e8f0;
    --text-dim: #8892a8;
    --accent: #6c63ff;
    --accent-light: #8b83ff;
    --green: #10b981;
    --amber: #f59e0b;
    --red: #ef4444;
    --cyan: #22d3ee;
    --pink: #ec4899;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

  .header {
    background: linear-gradient(135deg, #141722 0%, #1a1040 100%);
    border-bottom: 1px solid var(--border);
    padding: 24px 32px;
  }
  .header h1 {
    font-size: 24px; font-weight: 700;
    background: linear-gradient(135deg, #6c63ff, #22d3ee);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .header p { color: var(--text-dim); margin-top: 4px; font-size: 13px; }

  .main { display: flex; min-height: calc(100vh - 90px); }

  .sidebar {
    width: 400px; min-width: 400px;
    border-right: 1px solid var(--border);
    background: var(--surface);
    display: flex; flex-direction: column;
    max-height: calc(100vh - 90px);
  }
  .sidebar-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
    flex-shrink: 0;
  }
  .search-box {
    flex:1; background:var(--surface2); border:1px solid var(--border);
    border-radius:8px; padding:9px 12px; color:var(--text);
    font-size:13px; font-family:'DM Sans',sans-serif; outline:none;
  }
  .search-box:focus { border-color:var(--accent); }
  .search-box::placeholder { color:var(--text-dim); }

  .filter-bar {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; gap: 6px; flex-wrap: wrap;
    flex-shrink: 0;
  }
  .filter-chip {
    background:var(--surface2); border:1px solid var(--border);
    border-radius:16px; padding:4px 10px; font-size:11px;
    color:var(--text-dim); cursor:pointer; transition:all 0.15s;
  }
  .filter-chip:hover { border-color:var(--accent); color:var(--text); }
  .filter-chip.active { background:rgba(108,99,255,0.15); border-color:var(--accent); color:var(--accent-light); }

  .test-list { overflow-y: auto; flex: 1; }

  .test-row {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer; transition: background 0.12s;
  }
  .test-row:hover { background:var(--surface2); }
  .test-row.selected { background:rgba(108,99,255,0.08); border-left:3px solid var(--accent); }
  .test-row-num { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--text-dim); margin-bottom:3px; }
  .test-row-path { font-size:13px; font-weight:600; margin-bottom:5px; line-height:1.3; }
  .test-row-meta { display:flex; gap:6px; flex-wrap:wrap; }
  .badge { font-size:10px; font-family:'JetBrains Mono',monospace; padding:2px 7px; border-radius:4px; font-weight:600; }
  .badge-topic { background:rgba(108,99,255,0.15); color:var(--accent-light); }
  .badge-profile-healthy { background:rgba(16,185,129,0.15); color:var(--green); }
  .badge-profile-alert { background:rgba(245,158,11,0.15); color:var(--amber); }
  .badge-profile-abusive { background:rgba(239,68,68,0.15); color:var(--red); }
  .badge-profile-all { background:rgba(34,211,238,0.15); color:var(--cyan); }
  .badge-profile-platinum { background:rgba(236,72,153,0.15); color:var(--pink); }
  .badge-action { background:rgba(255,255,255,0.06); color:var(--text-dim); }

  .content {
    flex:1; overflow-y:auto;
    max-height:calc(100vh - 90px);
    padding:28px 36px;
  }

  .empty-state {
    display:flex; flex-direction:column; align-items:center;
    justify-content:center; height:60vh; color:var(--text-dim); text-align:center;
  }
  .empty-icon { font-size:56px; margin-bottom:16px; opacity:0.3; }
  .empty-title { font-size:18px; font-weight:600; margin-bottom:6px; color:var(--text); }

  .result-header { margin-bottom:24px; }
  .result-title { font-size:18px; font-weight:700; margin-bottom:4px; }
  .result-subtitle { color:var(--text-dim); font-size:13px; }

  .info-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(170px,1fr)); gap:10px; margin-bottom:24px; }
  .info-card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:12px 16px; }
  .info-card-label { font-size:10px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:3px; }
  .info-card-value { font-size:14px; font-weight:600; }

  .section-title {
    font-size:13px; font-weight:700; text-transform:uppercase;
    letter-spacing:0.8px; color:var(--text-dim);
    margin:20px 0 14px; padding-bottom:6px;
    border-bottom:1px solid var(--border);
  }

  .path-summary {
    background:var(--surface); border:1px solid var(--border);
    border-radius:8px; padding:16px;
    font-family:'JetBrains Mono',monospace; font-size:12px;
    line-height:2.2; margin-bottom:8px; overflow-x:auto;
  }
  .path-arrow { color:var(--text-dim); margin:0 2px; }
  .path-id { padding:2px 7px; border-radius:4px; font-weight:600; }
  .path-id.nav { background:rgba(108,99,255,0.12); color:var(--accent-light); }
  .path-id.complaint { background:rgba(236,72,153,0.15); color:var(--pink); }
  .path-id.condition { background:rgba(34,211,238,0.12); color:var(--cyan); }
  .path-id.resolution { background:rgba(16,185,129,0.12); color:var(--green); }
  .path-id.branch { background:rgba(245,158,11,0.12); color:var(--amber); }
  .path-id.leaf { background:rgba(139,131,255,0.1); color:var(--accent-light); }

  .path-label {
    font-size:11px; color:var(--text-dim); margin-bottom:6px;
    font-family:'JetBrains Mono',monospace;
  }

  /* Flow nodes */
  .flow-step {
    position:relative; padding-left:36px; margin-bottom:0; min-height:50px;
  }
  .flow-step::before {
    content:''; position:absolute; left:13px; top:24px; bottom:0;
    width:2px; background:var(--border);
  }
  .flow-step:last-child::before { display:none; }
  .flow-step .dot {
    position:absolute; left:6px; top:14px;
    width:16px; height:16px; border-radius:50%;
    border:2px solid var(--accent); background:var(--bg); z-index:2;
  }
  .flow-step .dot.root { background:var(--accent); border-color:var(--accent); }
  .flow-step .dot.complaint { background:var(--pink); border-color:var(--pink); }
  .flow-step .dot.condition { background:var(--cyan); border-color:var(--cyan); }
  .flow-step .dot.resolution { background:var(--green); border-color:var(--green); }
  .flow-step .dot.leaf { background:var(--amber); border-color:var(--amber); }

  .flow-card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:8px; padding:12px 16px; margin-bottom:6px;
  }
  .flow-card.highlight-complaint { border-color:var(--pink); background:rgba(236,72,153,0.04); }
  .flow-card.highlight-match { border-color:var(--green); background:rgba(16,185,129,0.04); }
  .flow-card.highlight-condition { border-color:var(--cyan); background:rgba(34,211,238,0.04); }

  .fc-header { display:flex; align-items:center; gap:8px; margin-bottom:6px; flex-wrap:wrap; }
  .fc-nid {
    font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:700;
    color:var(--accent); background:rgba(108,99,255,0.1);
    padding:2px 7px; border-radius:4px;
  }
  .fc-desc { font-size:12px; line-height:1.5; color:var(--text); }
  .fc-meta { margin-top:6px; display:flex; gap:5px; flex-wrap:wrap; }
  .meta-tag {
    font-size:9px; font-family:'JetBrains Mono',monospace;
    padding:2px 5px; border-radius:3px;
    background:rgba(255,255,255,0.04); color:var(--text-dim);
  }
  .meta-tag.action-tag { background:rgba(16,185,129,0.1); color:var(--green); cursor:help; }
  .meta-tag.cond-tag { background:rgba(34,211,238,0.1); color:var(--cyan); cursor:help; }
  .meta-tag.last-tag { background:rgba(245,158,11,0.1); color:var(--amber); }

  .branch-fork {
    margin-left:36px; padding-left:18px;
    border-left:2px dashed var(--border);
    margin-bottom:4px;
  }
  .branch-label {
    font-family:'JetBrains Mono',monospace;
    font-size:11px; font-weight:700; padding:4px 0 2px;
  }
  .branch-label.yes { color:var(--green); }
  .branch-label.no { color:var(--red); }
  .branch-label.cond { color:var(--cyan); }
  .branch-label.profile { color:var(--pink); }

  .alt-paths-header {
    font-size:12px; font-weight:700; color:var(--amber);
    margin:14px 0 8px; padding:6px 12px;
    background:rgba(245,158,11,0.06); border-radius:6px;
    border-left:3px solid var(--amber);
  }

  .legend { display:flex; gap:14px; margin:16px 0; flex-wrap:wrap; }
  .legend-item { display:flex; align-items:center; gap:5px; font-size:11px; color:var(--text-dim); }
  .legend-dot { width:10px; height:10px; border-radius:50%; }

  .tooltip {
    position:fixed; background:var(--surface2); border:1px solid var(--accent);
    border-radius:8px; padding:10px 14px; font-size:12px;
    max-width:340px; z-index:1000; box-shadow:0 8px 24px rgba(0,0,0,0.5);
    pointer-events:none; display:none;
  }
  .tooltip .tt-code { font-family:'JetBrains Mono',monospace; color:var(--accent); font-weight:700; }
  .tooltip .tt-desc { color:var(--text); margin-top:4px; }

  ::-webkit-scrollbar { width:6px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
</style>
</head>
<body>

<div class="header">
  <h1>Promise Engine — PE Testing Flow Tracker</h1>
  <p>Select a test case to trace the exact node path: Root → Complaint → Condition Branch → Satisfaction Flow</p>
</div>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-header">
      <input class="search-box" type="text" placeholder="Search row #, complaint, profile..." id="searchBox">
    </div>
    <div class="filter-bar" id="filterBar"></div>
    <div class="test-list" id="testList"></div>
  </div>
  <div class="content" id="contentArea">
    <div class="empty-state">
      <div class="empty-icon">🔍</div>
      <div class="empty-title">Select a Test Case</div>
      <p>Choose a row from the Testing Schedule to trace the complete node flow</p>
    </div>
  </div>
</div>

<div class="tooltip" id="tooltip"></div>

ng of the customer", "Unnamed: 2": null, "Unnamed: 3": null, "Unnamed: 4": null, "Unnamed: 5": null, "Unnamed: 6": null, "Unnamed: 7": null, "Unnamed: 8": null, "Unnamed: 9": null}];

// Lookup maps
const nodeById = {};
NODES.forEach(n => { nodeById[n.NODE_ID] = n; });

const childrenOf = {};
NODES.forEach(n => {
  const pid = n.PARENT_NODE_ID;
  if (pid && pid !== 'Null' && pid !== null) {
    const k = typeof pid === 'number' ? pid : parseInt(pid);
    if (!isNaN(k)) {
      if (!childrenOf[k]) childrenOf[k] = [];
      childrenOf[k].push(n.NODE_ID);
    }
  }
});

const defsMap = {};
DEFS.forEach(d => {
  if (d.NEW && d['Unnamed: 1']) defsMap[d.NEW.trim()] = d['Unnamed: 1'];
});

const profileMap = {
  'Healthy': 'H', 'Alert': 'A', 'Abusive': 'B',
  'All Profiles': 'HAB', 'Platinum': 'P'
};

function getProfileChar(profile) {
  if (!profile) return 'HAB';
  return profileMap[profile.trim()] || 'HAB';
}

function custTypeContains(custType, profileChar) {
  if (!custType || !profileChar) return true;
  if (profileChar === 'HAB') return true;
  for (const c of profileChar) {
    if (custType.includes(c)) return true;
  }
  return false;
}

// ===== CORE LOGIC: Find the complaint node from Node Path text =====
function findComplaintNode(nodePath) {
  if (!nodePath) return null;
  const path = nodePath.trim();

  // Exact match on DESCRIPTION
  let match = NODES.find(n => n.DESCRIPTION && n.DESCRIPTION.trim() === path);
  if (match) return match.NODE_ID;

  // Exact match on SHORT_NAME
  match = NODES.find(n => n.SHORT_NAME && n.SHORT_NAME.trim() === path);
  if (match) return match.NODE_ID;

  // Fuzzy matching - find closest
  const pathLower = path.toLowerCase();
  const pathWords = pathLower.split(/\s+/).filter(w => w.length > 2);
  let bestScore = 0, bestId = null;

  NODES.forEach(n => {
    const desc = (n.DESCRIPTION || '').toLowerCase();
    const sname = (n.SHORT_NAME || '').toLowerCase();
    let score = 0;

    // Count matching words
    const wordMatches = pathWords.filter(w => desc.includes(w) || sname.includes(w)).length;
    score = wordMatches / pathWords.length;

    // Bonus for similar length (prefer specific nodes, not generic prompts)
    if (score > 0.5) {
      const lenRatio = Math.min(desc.length, path.length) / Math.max(desc.length, path.length);
      score += lenRatio * 0.3;
    }

    // Penalize question/prompt nodes (ACTION Q or S) - we want the selection node
    if (n.ACTION === 'Q' || n.ACTION === 'S') score -= 0.2;

    // Bonus for nodes that are "selectable" (user-facing complaint options)
    if (n.ACTION === 'X' && n.LAST_NODE === 'N') score += 0.05;

    if (score > bestScore) { bestScore = score; bestId = n.NODE_ID; }
  });

  return bestId;
}

// ===== Trace node to root =====
function traceToRoot(nodeId) {
  const path = [nodeId];
  let current = nodeId;
  let safety = 0;
  while (safety++ < 50) {
    const node = nodeById[current];
    if (!node) break;
    const pid = node.PARENT_NODE_ID;
    if (!pid || pid === 'Null' || pid === null) break;
    const pidNum = typeof pid === 'number' ? pid : parseInt(pid);
    if (isNaN(pidNum)) break;
    path.unshift(pidNum);
    current = pidNum;
  }
  return path;
}

// ===== KEY LOGIC: From complaint node, walk DOWN selecting the right branch =====
// At each level, select child based on Profile (CUSTOMER_TYPE) and Action Code (match against CONDITION and ACTION)
function findMatchingPath(complaintNodeId, profileChar, actionCode) {
  // Parse action code parts (e.g., "RNP, SLABD30" -> ["RNP", "SLABD30"])
  const actionParts = actionCode ? actionCode.split(',').map(s => s.trim()).filter(Boolean) : [];

  // Recursive: from a node, find the matching child and continue down
  function walkDown(nodeId, depth) {
    if (depth > 20) return [];
    const children = (childrenOf[nodeId] || []).map(cid => nodeById[cid]).filter(Boolean);
    if (children.length === 0) return []; // leaf

    // STEP 1: Filter by CUSTOMER_TYPE matching profile
    let candidates = children.filter(c => custTypeContains(c.CUSTOMER_TYPE, profileChar));
    if (candidates.length === 0) candidates = children; // fallback

    // STEP 2: If action code parts present, match against CONDITION
    if (actionParts.length > 0 && actionParts[0] !== '-' && actionParts[0] !== 'X') {
      // Try matching action parts against CONDITION field
      const condMatched = candidates.filter(c => {
        if (!c.CONDITION) return false;
        const condParts = c.CONDITION.split(',').map(s => s.trim());
        return actionParts.every(ap => condParts.some(cp => cp.includes(ap) || ap.includes(cp)));
      });

      if (condMatched.length > 0) {
        // Found condition match - return all matching branches
        return condMatched.map(c => ({
          node: c,
          subtree: walkDown(c.NODE_ID, depth + 1)
        }));
      }

      // Try matching against ACTION field
      const actMatched = candidates.filter(c => {
        if (!c.ACTION || c.ACTION === 'X' || c.ACTION === 'Q' || c.ACTION === 'S') return false;
        return actionParts.some(ap => c.ACTION === ap || c.ACTION.includes(ap));
      });
      if (actMatched.length > 0) {
        return actMatched.map(c => ({
          node: c,
          subtree: walkDown(c.NODE_ID, depth + 1)
        }));
      }

      // Try matching action code = X against ACTION = X nodes (apology only)
      if (actionParts.includes('X') || actionParts[0] === 'X') {
        const xMatched = candidates.filter(c => c.ACTION === 'X');
        if (xMatched.length > 0) {
          return xMatched.map(c => ({
            node: c,
            subtree: walkDown(c.NODE_ID, depth + 1)
          }));
        }
      }
    }

    // STEP 3: For Action Code = X or - (apology/manual), filter by profile type only
    if (!actionCode || actionCode === '-' || actionCode === 'X') {
      // If there's a single candidate, follow it
      if (candidates.length === 1) {
        return [{ node: candidates[0], subtree: walkDown(candidates[0].NODE_ID, depth + 1) }];
      }
      // Multiple candidates - show all
      return candidates.map(c => ({
        node: c,
        subtree: walkDown(c.NODE_ID, depth + 1)
      }));
    }

    // STEP 4: Fallback - if only one candidate left, follow it; else show all
    if (candidates.length === 1) {
      return [{ node: candidates[0], subtree: walkDown(candidates[0].NODE_ID, depth + 1) }];
    }
    // For nodes like "Are you satisfied?" (Q) with Yes/No children, show both
    const parent = nodeById[nodeId];
    if (parent && parent.ACTION === 'Q') {
      return candidates.map(c => ({
        node: c,
        subtree: walkDown(c.NODE_ID, depth + 1)
      }));
    }

    return candidates.map(c => ({
      node: c,
      subtree: walkDown(c.NODE_ID, depth + 1)
    }));
  }

  return walkDown(complaintNodeId, 0);
}

// ===== Build complete flow for a test row =====
function buildFlow(rowIdx) {
  const testRow = TESTING[rowIdx];
  const nodePath = testRow['Node Path (Complaint Type)'];
  const profile = testRow['Profile'];
  const actionCode = testRow['Action Code'];

  const complaintId = findComplaintNode(nodePath);
  if (!complaintId) return null;

  const profileChar = getProfileChar(profile);
  const rootPath = traceToRoot(complaintId);
  const branches = findMatchingPath(complaintId, profileChar, actionCode);

  return { testRow, complaintId, rootPath, branches, profileChar, actionCode };
}

// ===== RENDERING =====
function esc(s) { return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : ''; }

let selectedRow = null;
let activeFilter = null;

function renderList(filter) {
  const list = document.getElementById('testList');
  const q = (filter || '').toLowerCase();
  let html = '';
  TESTING.forEach((t, i) => {
    const path = t['Node Path (Complaint Type)'] || '';
    const topic = t['Topic'] || '';
    const profile = (t['Profile'] || '').trim();
    const action = t['Action Code'] || '';
    if (activeFilter && topic !== activeFilter) return;
    const text = (i + ' ' + path + ' ' + topic + ' ' + profile + ' ' + action).toLowerCase();
    if (q && !text.includes(q)) return;

    const pc = profile.includes('Healthy') ? 'healthy' : profile.includes('Alert') ? 'alert' :
      profile.includes('Abusive') ? 'abusive' : profile.includes('Platinum') ? 'platinum' : 'all';
    html += '<div class="test-row' + (selectedRow === i ? ' selected' : '') + '" data-i="' + i + '">' +
      '<div class="test-row-num">Row ' + i + '</div>' +
      '<div class="test-row-path">' + esc(path) + '</div>' +
      '<div class="test-row-meta">' +
        '<span class="badge badge-topic">' + esc(topic) + '</span>' +
        '<span class="badge badge-profile-' + pc + '">' + esc(profile) + '</span>' +
        (action && action !== '-' ? '<span class="badge badge-action">' + esc(action) + '</span>' : '') +
      '</div></div>';
  });
  list.innerHTML = html || '<div style="padding:30px;text-align:center;color:var(--text-dim)">No matches</div>';
  list.querySelectorAll('.test-row').forEach(el => {
    el.onclick = () => { selectedRow = parseInt(el.dataset.i); renderList(document.getElementById('searchBox').value); renderFlow(selectedRow); };
  });
}

function renderFlow(idx) {
  const c = document.getElementById('contentArea');
  const flow = buildFlow(idx);
  if (!flow) {
    c.innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">No matching node found</div></div>';
    return;
  }

  const { testRow, complaintId, rootPath, branches, profileChar, actionCode } = flow;
  let h = '';

  // Header
  h += '<div class="result-header">';
  h += '<div class="result-title">Row ' + idx + ': ' + esc(testRow['Node Path (Complaint Type)']) + '</div>';
  h += '<div class="result-subtitle">Matched complaint → Node ' + complaintId + '</div></div>';

  // Info cards
  h += '<div class="info-grid">';
  h += ic('Topic', testRow['Topic']);
  h += ic('Profile', testRow['Profile']);
  h += ic('Action Code', testRow['Action Code'] || '—');
  h += ic('QA Instruction', testRow['QA Instruction (Order Value)'] || '—');
  h += ic('Expected Treatment', testRow['Expected Bot Treatment'] || '—');
  h += ic('Assigned To', testRow['Assigne'] || '—');
  h += '</div>';

  // Collect all linear paths from branches
  const allPaths = [];
  function collectPaths(branchArr, prefix) {
    if (!branchArr || branchArr.length === 0) return;
    branchArr.forEach(b => {
      const cur = [...prefix, b.node.NODE_ID];
      if (!b.subtree || b.subtree.length === 0) {
        allPaths.push(cur);
      } else {
        collectPaths(b.subtree, cur);
      }
    });
  }
  collectPaths(branches, []);

  // Path Summary
  h += '<div class="section-title">Node Path Summary</div>';
  h += '<div class="path-label">🗺️ Navigation to complaint:</div>';
  h += '<div class="path-summary">';
  rootPath.forEach((nid, i) => {
    const cls = nid === complaintId ? 'complaint' : 'nav';
    h += '<span class="path-id ' + cls + '">' + nid + '</span>';
    if (i < rootPath.length - 1) h += '<span class="path-arrow"> → </span>';
  });
  h += '</div>';

  if (allPaths.length > 0) {
    h += '<div class="path-label" style="margin-top:8px">🔀 Branch paths from complaint node:</div>';
    allPaths.forEach((p, pi) => {
      h += '<div class="path-summary" style="margin-bottom:4px">';
      h += '<span class="path-id complaint">' + complaintId + '</span><span class="path-arrow"> → </span>';
      p.forEach((nid, i) => {
        const n = nodeById[nid];
        const cls = (n && n.LAST_NODE === 'Y') ? 'resolution' :
          (n && n.CONDITION) ? 'condition' :
          (n && (n.DESCRIPTION === 'Yes' || n.DESCRIPTION === 'No')) ? 'branch' : 'leaf';
        h += '<span class="path-id ' + cls + '">' + nid + '</span>';
        if (i < p.length - 1) h += '<span class="path-arrow"> → </span>';
      });
      h += '</div>';
    });
  }

  // Legend
  h += '<div class="legend" style="margin-top:16px">';
  h += '<div class="legend-item"><div class="legend-dot" style="background:var(--accent)"></div>Navigation</div>';
  h += '<div class="legend-item"><div class="legend-dot" style="background:var(--pink)"></div>Complaint Node</div>';
  h += '<div class="legend-item"><div class="legend-dot" style="background:var(--cyan)"></div>Condition</div>';
  h += '<div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>Resolution/Leaf</div>';
  h += '<div class="legend-item"><div class="legend-dot" style="background:var(--amber)"></div>Yes/No Branch</div>';
  h += '</div>';

  // Detailed flow: root to complaint
  h += '<div class="section-title">Detailed Node Flow</div>';
  h += '<div style="margin-bottom:8px;font-size:12px;color:var(--text-dim)">Navigation path to complaint:</div>';
  rootPath.forEach(nid => {
    const node = nodeById[nid];
    if (!node) return;
    const isComplaint = nid === complaintId;
    h += renderNode(node, isComplaint ? 'complaint' : 'root', isComplaint ? 'highlight-complaint' : '');
  });

  // Branch flow from complaint
  if (branches.length > 0) {
    h += '<div style="margin-top:16px;margin-bottom:8px;font-size:12px;color:var(--text-dim)">Decision branches from Node ' + complaintId + ':</div>';
    h += renderBranches(branches, 0);
  }

  c.innerHTML = h;
  attachTooltips();
}

function renderBranches(branchArr, depth) {
  if (!branchArr || branchArr.length === 0) return '';
  let h = '';
  branchArr.forEach((b, i) => {
    const node = b.node;
    const label = getBranchLabel(node);
    const labelCls = (node.DESCRIPTION === 'Yes') ? 'yes' : (node.DESCRIPTION === 'No') ? 'no' :
      node.CONDITION ? 'cond' : 'profile';

    h += '<div class="branch-fork">';
    if (label) h += '<div class="branch-label ' + labelCls + '">' + esc(label) + '</div>';

    const isLeaf = node.LAST_NODE === 'Y';
    const hasCond = !!node.CONDITION;
    const dotType = isLeaf ? 'resolution' : hasCond ? 'condition' : (node.DESCRIPTION === 'Yes' || node.DESCRIPTION === 'No') ? 'leaf' : '';
    const highlight = hasCond ? 'highlight-condition' : isLeaf ? 'highlight-match' : '';
    h += renderNode(node, dotType, highlight);

    if (b.subtree && b.subtree.length > 0) {
      h += renderBranches(b.subtree, depth + 1);
    }
    h += '</div>';
  });
  return h;
}

function getBranchLabel(node) {
  if (node.DESCRIPTION === 'Yes') return '✓ YES path';
  if (node.DESCRIPTION === 'No') return '✗ NO path';
  if (node.CONDITION) return '⚡ Condition: ' + node.CONDITION;
  const typeNames = { H:'Healthy', A:'Alert', B:'Abusive', P:'Platinum' };
  if (node.CUSTOMER_TYPE && node.CUSTOMER_TYPE.length <= 2) {
    return '👤 ' + node.CUSTOMER_TYPE.split('').map(c => typeNames[c] || c).join(' + ');
  }
  return null;
}

function renderNode(node, dotType, cardClass) {
  let h = '<div class="flow-step">';
  h += '<div class="dot ' + (dotType || '') + '"></div>';
  h += '<div class="flow-card ' + (cardClass || '') + '">';
  h += '<div class="fc-header">';
  h += '<span class="fc-nid">N' + node.NODE_ID + '</span>';
  if (node.ACTION && node.ACTION !== 'X') {
    h += '<span class="meta-tag action-tag tt-hover" data-code="' + esc(node.ACTION) + '">ACT: ' + esc(node.ACTION) + '</span>';
  }
  if (node.CONDITION) {
    h += '<span class="meta-tag cond-tag tt-hover" data-code="' + esc(node.CONDITION) + '">COND: ' + esc(node.CONDITION) + '</span>';
  }
  if (node.LAST_NODE === 'Y') {
    h += '<span class="meta-tag last-tag">🏁 LAST NODE</span>';
  }
  h += '</div>';
  h += '<div class="fc-desc">' + esc(node.DESCRIPTION) + '</div>';
  h += '<div class="fc-meta">';
  h += '<span class="meta-tag">Type: ' + esc(node.CUSTOMER_TYPE) + '</span>';
  h += '<span class="meta-tag">Tier: ' + esc(node.LOYALTY_TIER) + '</span>';
  h += '<span class="meta-tag">Status: ' + esc(node.STATUS) + '</span>';
  h += '</div></div></div>';
  return h;
}

function ic(label, val) {
  return '<div class="info-card"><div class="info-card-label">' + label + '</div><div class="info-card-value">' + esc(val) + '</div></div>';
}

function attachTooltips() {
  const tt = document.getElementById('tooltip');
  document.querySelectorAll('.tt-hover').forEach(el => {
    el.onmouseenter = e => {
      const code = el.dataset.code;
      if (!code) return;
      const parts = code.split(',').map(s => s.trim());
      let html = '';
      parts.forEach(p => {
        if (defsMap[p]) html += '<div class="tt-code">' + esc(p) + '</div><div class="tt-desc">' + esc(defsMap[p]) + '</div>';
      });
      if (!html) return;
      tt.innerHTML = html;
      tt.style.display = 'block';
      const r = el.getBoundingClientRect();
      tt.style.left = Math.min(r.left, window.innerWidth - 360) + 'px';
      tt.style.top = (r.bottom + 6) + 'px';
    };
    el.onmouseleave = () => { tt.style.display = 'none'; };
  });
}

// Filters
function initFilters() {
  const topics = [...new Set(TESTING.map(t => t['Topic']).filter(Boolean))];
  const bar = document.getElementById('filterBar');
  let html = '<span class="filter-chip active" data-t="">All</span>';
  topics.forEach(t => { html += '<span class="filter-chip" data-t="' + esc(t) + '">' + esc(t) + '</span>'; });
  bar.innerHTML = html;
  bar.querySelectorAll('.filter-chip').forEach(chip => {
    chip.onclick = () => {
      bar.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      activeFilter = chip.dataset.t || null;
      renderList(document.getElementById('searchBox').value);
    };
  });
}

document.getElementById('searchBox').addEventListener('input', e => renderList(e.target.value));
initFilters();
renderList();
